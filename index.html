<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle do Barbeiro</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#painel {
  margin: 20px;
  font-size: 18px;
}

.bom { color: #00ff88; }
.ruim { color: #ff4d4d; }

table {
  margin: 20px auto;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
}

input {
  width: 70px;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Meta: R$ 5.000</h1>

<div id="painel">
  <p>Total: <span id="total">0</span></p>
  <p>Faltam: <span id="faltam">5000</span></p>
  <p>Meta diária: <span id="metaDia">0</span></p>
</div>

<button onclick="resetar()">🔄 Resetar</button>

<table id="tabela">
<tr>
  <th>Dia</th>
  <th>Ganho</th>
  <th>Gastos</th>
  <th>Guardado</th>
  <th>Total</th>
</tr>
</table>

<script>
let meta = 5000;
let dias = 30;
let tabela = document.getElementById("tabela");

// carregar dados
let dadosSalvos = JSON.parse(localStorage.getItem("dados")) || [];

// criar tabela
for (let i = 1; i <= dias; i++) {
  let row = tabela.insertRow();

  row.insertCell(0).innerText = i;

  let ganho = row.insertCell(1);
  let gastos = row.insertCell(2);
  let guardado = row.insertCell(3);
  let total = row.insertCell(4);

  let ganhoValor = dadosSalvos[i-1]?.ganho || "";
  let gastosValor = dadosSalvos[i-1]?.gastos || "";

  ganho.innerHTML = `<input type="number" value="${ganhoValor}" oninput="calcular()">`;
  gastos.innerHTML = `<input type="number" value="${gastosValor}" oninput="calcular()">`;

  guardado.innerText = "0";
  total.innerText = "0";
}

function calcular() {
  let linhas = tabela.rows;
  let acumulado = 0;
  let dadosParaSalvar = [];

  for (let i = 1; i < linhas.length; i++) {
    let ganho = Number(linhas[i].cells[1].children[0].value) || 0;
    let gastos = Number(linhas[i].cells[2].children[0].value) || 0;

    let guardado = ganho - gastos;
    acumulado += guardado;

    linhas[i].cells[3].innerText = guardado;
    linhas[i].cells[4].innerText = acumulado;

    dadosParaSalvar.push({
      ganho: ganho,
      gastos: gastos
    });
  }

  // salvar dados
  localStorage.setItem("dados", JSON.stringify(dadosParaSalvar));

  // atualizar painel
  document.getElementById("total").innerText = acumulado.toFixed(2);

  let faltam = meta - acumulado;
  document.getElementById("faltam").innerText = faltam.toFixed(2);

  let diasRestantes = dias;
  let metaDia = faltam / diasRestantes;
  document.getElementById("metaDia").innerText = metaDia.toFixed(2);

  // feedback visual
  let painel = document.getElementById("painel");

  if (faltam <= 0) {
    painel.className = "bom";
  } else if (metaDia > 150) {
    painel.className = "ruim";
  } else {
    painel.className = "";
  }
}

// resetar
function resetar() {
  if (confirm("Tem certeza que quer apagar tudo?")) {
    localStorage.removeItem("dados");
    location.reload();
  }
}

// carregar dados ao abrir
calcular();
</script>

</body>
</html>
