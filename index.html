<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle do Barbeiro</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #22c55e;
  --danger: #ef4444;
  --text: #e2e8f0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 15px;
}

/* Header */
h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

/* Painel */
#painel {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  flex: 1;
  min-width: 100px;
  text-align: center;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.valor {
  font-size: 20px;
  font-weight: bold;
}

/* Barra progresso */
#barra-container {
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

#barra {
  height: 12px;
  width: 0%;
  background: var(--accent);
  transition: width 0.5s ease;
}

/* Botão */
button {
  width: 100%;
  padding: 12px;
  background: #334155;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  margin-bottom: 10px;
  transition: 0.2s;
}

button:hover {
  background: #475569;
}

/* Tabela */
.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 500px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

tr:hover {
  background: rgba(255,255,255,0.03);
}

input {
  width: 70px;
  padding: 6px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

/* Responsivo */
@media(max-width: 600px) {
  h1 { font-size: 18px; }
  input { width: 60px; }
}
</style>
</head>

<body>

<h1>Meta: R$ 5.000</h1>

<div id="painel">
  <div class="card">
    <p>Total</p>
    <div class="valor" id="total">0</div>
  </div>

  <div class="card">
    <p>Faltam</p>
    <div class="valor" id="faltam">0</div>
  </div>

  <div class="card">
    <p>Meta diária</p>
    <div class="valor" id="metaDia">0</div>
  </div>
</div>

<div id="barra-container">
  <div id="barra"></div>
</div>

<button onclick="resetar()">🔄 Resetar</button>

<div class="table-container">
<table id="tabela">
<tr>
<th>Dia</th>
<th>Ganho</th>
<th>Gastos</th>
<th>Guardado</th>
<th>Total</th>
</tr>
</table>
</div>

<script>
let meta = 5000;
let dias = 30;
let tabela = document.getElementById("tabela");

let dadosSalvos = JSON.parse(localStorage.getItem("dados")) || [];

for (let i = 1; i <= dias; i++) {
  let row = tabela.insertRow();

  row.insertCell(0).innerText = i;

  let ganho = row.insertCell(1);
  let gastos = row.insertCell(2);
  let guardado = row.insertCell(3);
  let total = row.insertCell(4);

  let ganhoValor = dadosSalvos[i-1]?.ganho || "";
  let gastosValor = dadosSalvos[i-1]?.gastos || "";

  ganho.innerHTML = `<input type="number" value="${ganhoValor}" oninput="calcular()">`;
  gastos.innerHTML = `<input type="number" value="${gastosValor}" oninput="calcular()">`;

  guardado.innerText = "0";
  total.innerText = "0";
}

function calcular() {
  let linhas = tabela.rows;
  let acumulado = 0;
  let dadosParaSalvar = [];

  for (let i = 1; i < linhas.length; i++) {
    let ganho = Number(linhas[i].cells[1].children[0].value) || 0;
    let gastos = Number(linhas[i].cells[2].children[0].value) || 0;

    let guardado = ganho - gastos;
    acumulado += guardado;

    linhas[i].cells[3].innerText = guardado;
    linhas[i].cells[4].innerText = acumulado;

    dadosParaSalvar.push({ ganho, gastos });
  }

  localStorage.setItem("dados", JSON.stringify(dadosParaSalvar));

  document.getElementById("total").innerText = acumulado.toFixed(2);

  let faltam = meta - acumulado;
  document.getElementById("faltam").innerText = faltam.toFixed(2);

  let metaDia = faltam / dias;
  document.getElementById("metaDia").innerText = metaDia.toFixed(2);

  // Barra progresso
  let progresso = (acumulado / meta) * 100;
  document.getElementById("barra").style.width = progresso + "%";

  // Feedback visual
  if (faltam <= 0) {
    document.getElementById("barra").style.background = "#22c55e";
  } else if (metaDia > 150) {
    document.getElementById("barra").style.background = "#ef4444";
  } else {
    document.getElementById("barra").style.background = "#22c55e";
  }
}

function resetar() {
  if (confirm("Apagar tudo?")) {
    localStorage.removeItem("dados");
    location.reload();
  }
}

calcular();
</script>

</body>
</html>
